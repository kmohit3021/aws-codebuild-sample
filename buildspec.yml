version: 0.2
env:
  parameter-store:
   KATALON_API_KEY: "dbab905c-0ea1-4033-a517-0047264a104d"
phases:
  pre_build:
    commands:
      - docker pull katalonstudio/katalon
  build:
    commands:
      - docker run -t --rm -v "$(pwd)":/katalon/katalon/source katalonstudio/katalon katalon-execute.sh -apiKey=$KATALON_API_KEY -browserType="Chrome" -retry=0 -statusDelay=15 -testSuitePath="Test Suites/TS001"
artifacts:
  files:
    - report/*
reports: #New
  KatalonTestReports: # CodeBuild will create a report group called "KatalonTestReports".
    files: #Store all of the files
      - 'report/JUnit_Report.xml'
